                <h2>Engineering Economics Fundamentals</h2>
                
                <h3>Engineering Economics Overview</h3>
                <p>Engineering economics provides tools for making decisions involving money and resources in engineering projects. It combines technical knowledge with economic analysis.</p>

                <h3>Decision Making Process</h3>
                <ul>

                <h2>Time Value of Money & Equivalence</h2>
                
                <h3>Core Principle</h3>
                <p>Money available today is worth more than the same amount in the future because it can be invested to earn returns. This fundamental concept underlies all engineering economic analysis.</p>

                <h3>Single-Payment Compound Amount</h3>
                <p>Find future value of a present amount:</p>
                <div class="formula">F = P(1 + i)^n<br>or F = P(F/P, i%, n)<br><br>Where:<br>F = Future value<br>P = Present value<br>i = interest rate per period<br>n = number of periods</div>

                <h3>Single-Payment Present Worth</h3>
                <p>Find present value of a future amount:</p>
                <div class="formula">P = F(1 + i)^-n<br>or P = F(P/F, i%, n)<br><br>This is the reciprocal of compound amount</div>

                <h3>Economic Equivalence</h3>

                <h3>Core Concept</h3>

    function calculatePV() {
        const fv = parseFloat(document.getElementById('pv-fv').value);
        const rate = parseFloat(document.getElementById('pv-rate').value) / 100;
        const n = parseFloat(document.getElementById('pv-n').value);
        
        if (isNaN(fv) || isNaN(rate) || isNaN(n)) {
            alert('Please fill in all fields');
            return;
        }
        
        const pv = fv / Math.pow(1 + rate, n);
        const result = document.getElementById('pv-result');
        result.style.display = 'block';
        result.innerHTML = `
            <strong>Present Value: $${pv.toFixed(2)}</strong><br>
            Formula: PV = FV / (1 + i)^n<br>
            Calculation: ${fv.toFixed(2)} / (1 + ${rate.toFixed(4)})^${n} = $${pv.toFixed(2)}
        `;
    }

    function calculateFV() {
        const pv = parseFloat(document.getElementById('fv-pv').value);
        const rate = parseFloat(document.getElementById('fv-rate').value) / 100;
        const n = parseFloat(document.getElementById('fv-n').value);
        
        if (isNaN(pv) || isNaN(rate) || isNaN(n)) {
            alert('Please fill in all fields');
            return;
        }
        
        const fv = pv * Math.pow(1 + rate, n);
        const result = document.getElementById('fv-result');
        result.style.display = 'block';
        result.innerHTML = `
            <strong>Future Value: $${fv.toFixed(2)}</strong><br>
            Formula: FV = PV × (1 + i)^n<br>
            Calculation: ${pv.toFixed(2)} × (1 + ${rate.toFixed(4)})^${n} = $${fv.toFixed(2)}
        `;
    }

    function calculateAnnuityPV() {
        const pmt = parseFloat(document.getElementById('apv-pmt').value);
        const rate = parseFloat(document.getElementById('apv-rate').value) / 100;
        const n = parseFloat(document.getElementById('apv-n').value);
        
        if (isNaN(pmt) || isNaN(rate) || isNaN(n)) {
            alert('Please fill in all fields');
            return;
        }
        
        const pv = pmt * ((1 - Math.pow(1 + rate, -n)) / rate);
        const result = document.getElementById('apv-result');
        result.style.display = 'block';
        result.innerHTML = `
            <strong>Present Value: $${pv.toFixed(2)}</strong><br>
            Formula: PV = A × [(1 - (1 + i)^-n) / i]<br>
            This is the lump sum equivalent of ${n} payments of $${pmt.toFixed(2)}
        `;
    }

    function calculateNPV() {
        const initial = parseFloat(document.getElementById('npv-initial').value);
        const cf = parseFloat(document.getElementById('npv-cf').value);
        const n = parseFloat(document.getElementById('npv-n').value);
        const rate = parseFloat(document.getElementById('npv-rate').value) / 100;
        
        if (isNaN(initial) || isNaN(cf) || isNaN(n) || isNaN(rate)) {
            alert('Please fill in all fields');
            return;
        }
        
        const pvFactor = (1 - Math.pow(1 + rate, -n)) / rate;
        const pvInflows = cf * pvFactor;
        const npv = -initial + pvInflows;
        
        const result = document.getElementById('npv-result');
        result.style.display = 'block';
        
        let decision = '';
        if (npv > 0) {
            decision = '<strong style="color: #4CAF50;">Accept - Project adds value</strong>';
        } else if (npv < 0) {
            decision = '<strong style="color: #F44336;">Reject - Project destroys value</strong>';
        } else {
            decision = '<strong>Indifferent - Project breaks even</strong>';
        }
        
        result.innerHTML = `
            <strong>Net Present Value: $${npv.toFixed(2)}</strong><br>
            ${decision}<br><br>
            PV of Inflows: $${pvInflows.toFixed(2)}<br>
            Initial Investment: $${initial.toFixed(2)}<br>
            NPV = ${pvInflows.toFixed(2)} - ${initial.toFixed(2)} = $${npv.toFixed(2)}
        `;
    }

    function calculatePayback() {
        const initial = parseFloat(document.getElementById('pb-initial').value);
        const cf = parseFloat(document.getElementById('pb-cf').value);
        
        if (isNaN(initial) || isNaN(cf)) {
            alert('Please fill in all fields');
            return;
        }
        
        const payback = initial / cf;
        const result = document.getElementById('pb-result');
        result.style.display = 'block';
        result.innerHTML = `
            <strong>Payback Period: ${payback.toFixed(2)} years</strong><br>
            Formula: Payback = Initial Investment / Annual Cash Flow<br>
            Calculation: ${initial.toFixed(2)} / ${cf.toFixed(2)} = ${payback.toFixed(2)} years<br><br>
            Note: This is simple payback and does not account for time value of money.
        `;
    }

    function calculateStraightLine() {
        const cost = parseFloat(document.getElementById('sl-cost').value);
        const salvage = parseFloat(document.getElementById('sl-salvage').value);
        const life = parseFloat(document.getElementById('sl-life').value);
        
        if (isNaN(cost) || isNaN(salvage) || isNaN(life)) {
            alert('Please fill in all fields');
            return;
        }
        
        const annual = (cost - salvage) / life;
        const result = document.getElementById('sl-result');
        result.style.display = 'block';
        result.innerHTML = `
            <strong>Annual Depreciation: $${annual.toFixed(2)}</strong><br>
            Formula: D = (Cost - Salvage) / Life<br>
            Calculation: (${cost.toFixed(2)} - ${salvage.toFixed(2)}) / ${life} = $${annual.toFixed(2)}<br><br>
            Depreciable Amount: $${(cost - salvage).toFixed(2)}<br>
            This amount is deducted equally each year for ${life} years.
        `;
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(`${tab}-section`).classList.add('active');

        if (tab === 'quiz') {
            document.getElementById('quiz-container').innerHTML = '';
        }
        if (tab === 'comprehensive') {
            document.getElementById('comprehensive-quiz-container').innerHTML = '';
        }
    }

                    ${question.options.map((option, index) => `
                        <div class="option" onclick="selectOption(${index})" id="option-${index}">
                            ${option}
                        </div>
                    `).join('')}
                </div>
                <div id="feedback"></div>
            </div>
            <div class="quiz-controls">
                <button class="btn" onclick="previousQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>Previous</button>
                <button class="btn btn-primary" onclick="checkAnswer()" id="check-btn" disabled>Check Answer</button>
            </div>
        `;
    }

    let selectedAnswer = null;

    function selectOption(index) {
        if (quizAnswers[currentQuestionIndex] !== undefined) return;
        
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
        document.getElementById(`option-${index}`).classList.add('selected');
        selectedAnswer = index;
        document.getElementById('check-btn').disabled = false;
    }

    function checkAnswer() {
        const question = currentQuestions[currentQuestionIndex];
        const isCorrect = selectedAnswer === question.correct;
        
        quizAnswers[currentQuestionIndex] = {
            selected: selectedAnswer,
            correct: question.correct,
            isCorrect: isCorrect
        };

        if (isCorrect) score++;

        document.querySelectorAll('.option').forEach((opt, idx) => {
            opt.classList.add('disabled');
            if (idx === question.correct) {
                opt.classList.add('correct');
            } else if (idx === selectedAnswer) {
                opt.classList.add('incorrect');
            }
        });

        const feedback = document.getElementById('feedback');
        feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
        feedback.innerHTML = `
            <strong>${isCorrect ? 'Correct!' : 'Incorrect'}</strong><br>
            ${question.explanation}
        `;

        const checkBtn = document.getElementById('check-btn');
        checkBtn.textContent = currentQuestionIndex === currentQuestions.length - 1 ? 'View Results' : 'Next Question';
        checkBtn.onclick = nextQuestion;
        checkBtn.disabled = false;
    }

    function nextQuestion() {
        if (currentQuestionIndex === currentQuestions.length - 1) {
            showResults();
        } else {
            currentQuestionIndex++;
            selectedAnswer = null;
            if (document.getElementById('comprehensive-quiz-container').innerHTML) {
                renderComprehensiveQuiz();
            } else {
                renderQuiz();
            }
        }
    }

    function previousQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            selectedAnswer = quizAnswers[currentQuestionIndex]?.selected;
            if (document.getElementById('comprehensive-quiz-container').innerHTML) {
                renderComprehensiveQuiz();
            } else {
                renderQuiz();
            }
            
            if (quizAnswers[currentQuestionIndex]) {
                const question = currentQuestions[currentQuestionIndex];
                const answer = quizAnswers[currentQuestionIndex];
                
                setTimeout(() => {
                    document.getElementById(`option-${answer.selected}`).classList.add('selected');
                    document.querySelectorAll('.option').forEach((opt, idx) => {
                        opt.classList.add('disabled');
                        if (idx === question.correct) {
                            opt.classList.add('correct');
                        } else if (idx === answer.selected) {
                            opt.classList.add('incorrect');
                        }
                    });

                    const feedback = document.getElementById('feedback');
                    feedback.className = `feedback ${answer.isCorrect ? 'correct' : 'incorrect'}`;
                    feedback.innerHTML = `
                        <strong>${answer.isCorrect ? 'Correct!' : 'Incorrect'}</strong><br>
                        ${question.explanation}
                    `;

                    const checkBtn = document.getElementById('check-btn');
                    checkBtn.textContent = currentQuestionIndex === currentQuestions.length - 1 ? 'View Results' : 'Next Question';
                    checkBtn.onclick = nextQuestion;
                }, 50);
            }
        }
    }

    function showResults() {
        const percentage = Math.round((score / currentQuestions.length) * 100);
        let message = '';
        
        if (percentage >= 90) {
            message = 'Outstanding! You have excellent mastery of engineering economics.';
        } else if (percentage >= 80) {
            message = 'Great job! You have a strong understanding of the concepts.';
        } else if (percentage >= 70) {
            message = 'Good work! Review the areas where you struggled.';
        } else if (percentage >= 60) {
            message = 'You are making progress. Keep studying the material.';
        } else {
            message = 'Keep working! Focus on understanding the core formulas and concepts.';
        }

        const topicBreakdown = {};
        currentQuestions.forEach((q, idx) => {
            if (!topicBreakdown[q.topic]) {
                topicBreakdown[q.topic] = { correct: 0, total: 0 };
            }
            topicBreakdown[q.topic].total++;
            if (quizAnswers[idx]?.isCorrect) {
                topicBreakdown[q.topic].correct++;
            }
        });

        const container = document.getElementById('comprehensive-quiz-container').innerHTML ? 
            document.getElementById('comprehensive-quiz-container') : 
            document.getElementById('quiz-container');

        container.innerHTML = `
            <div class="results-screen">
                <h2>Quiz Complete</h2>
                <div class="score-display">${percentage}%</div>
                <p class="performance-message">${message}</p>
                <p>You scored ${score} out of ${currentQuestions.length} questions</p>
                
                <div class="results-breakdown">
                    <h3 style="margin-bottom: 1rem;">Performance by Topic</h3>
                    ${Object.entries(topicBreakdown).map(([topicNum, data]) => {
                        const topicInfo = topics.find(t => t.number === parseInt(topicNum));
                        const topicPercentage = Math.round((data.correct / data.total) * 100);
                        return `
                            <div class="topic-score">
                                <span>${topicInfo.title}</span>
                                <span>${data.correct}/${data.total} (${topicPercentage}%)</span>
                            </div>
                        `;
                    }).join('')}
                </div>

                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="retakeQuiz()">Retake Quiz</button>
                    <button class="btn" onclick="switchTab('study')">Review Material</button>
                </div>
            </div>
        `;
    }

    function retakeQuiz() {
        if (document.getElementById('comprehensive-quiz-container').innerHTML) {
            startComprehensiveTest();
        } else if (currentQuizMode === 'targeted') {
            showTopicSelection();
        } else {
            startQuiz('random');
        }
    }

    function shuffleArray(array) {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    document.addEventListener('DOMContentLoaded', initializeApp);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeModal();
        }
    });
</script>
